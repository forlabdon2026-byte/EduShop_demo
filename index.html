    <meta charset="UTF-8">
    <title>GA Teaching Demo - Ecommerce</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #f8fafc, #e2e8f0);
            padding: 20px;
            margin: 0;
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
        }

        /* Grid Layout */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px;
        }

        /* Product Card */
        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            opacity: 0;
            animation: fadeIn 0.5s ease forwards;
        }

        /* Hover Effect */
        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.15);
        }

        /* Subtle Click Effect */
        .card:active {
            transform: scale(0.98);
        }

        /* Price Styling */
        .card p {
            font-size: 18px;
            font-weight: bold;
            color: #2563eb;
        }

        /* Button Styling */
        button {
            width: 100%;
            padding: 12px;
            background: #2563eb;
            color: white;
            border: none;
            margin-top: 15px;
            cursor: pointer;
            border-radius: 8px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #1e40af;
            transform: translateY(-2px);
        }

        button:active {
            transform: scale(0.95);
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }
    </style>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXX"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());

        /* Fixed: Added missing opening quote for the ID */
        gtag('config', 'G-XXXXXXXX', { 'debug_mode': true });
    </script>
</head>

<body>

    <h2>EduShop GA Teaching Demo</h2>

    <div class="grid" id="productGrid"></div>

    <script>
        /* Dummy Product Data */
        const products = [
            { id: 'p1', name: 'Quantum Headphones', price: 299, category: 'Electronics' },
            { id: 'p2', name: 'Cotton Minimalist Tee', price: 35, category: 'Fashion' },
            { id: 'p3', name: 'Smart Leather Wallet', price: 85, category: 'Accessories' },
            { id: 'p4', name: 'Ultra-Wide Monitor', price: 450, category: 'Electronics' },
            { id: 'p5', name: 'Canvas Backpack', price: 65, category: 'Accessories' }
        ];

        /* LEVEL 2: BASIC EVENT TRACKING (View Item) */
        function trackProductView(product) {
            gtag('event', 'view_item', {
                currency: 'INR',
                value: product.price,
                items: [{
                    item_id: product.id,
                    item_name: product.name,
                    item_category: product.category,
                    price: product.price
                }]
            });
            console.log("GA Event: view_item triggered for", product.name);
        }

        /* LEVEL 3: INDUSTRY LEVEL GA4 ECOMMERCE (Add to Cart) */
        function addToCart(event, product) {
            // Stops the click from triggering the parent card's 'view_item' event
            event.stopPropagation();

            gtag('event', 'add_to_cart', {
                currency: 'INR',
                value: product.price,
                items: [{
                    item_id: product.id,
                    item_name: product.name,
                    item_category: product.category,
                    price: product.price,
                    quantity: 1
                }]
            });

            console.log("GA Event: add_to_cart triggered for", product.name);
            alert(product.name + " added to cart!");
        }

        /* Render Products */
        function renderProducts() {
            const grid = document.getElementById("productGrid");
            products.forEach(product => {
                const card = document.createElement("div");
                card.className = "card";
                
                // Add click event for the whole card
                card.onclick = () => trackProductView(product);

                card.innerHTML = `
                    <h3>${product.name}</h3>
                    <p>₹${product.price}</p>
                    <button onclick='addToCart(event, ${JSON.stringify(product)})'>
                        Add to Cart
                    </button>
                `;
                grid.appendChild(card);
            });
        }

        renderProducts();
    </script>

</body>
</html>
